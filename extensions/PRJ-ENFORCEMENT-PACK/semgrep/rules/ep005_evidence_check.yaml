rules:
  - id: enf.v1.ep005.state_write_no_evidence
    languages: [python]
    message: "EP-005 Evidence Check: State transition call detected. Ensure evidence recording accompanies each state change (timestamp, operation, actor, before, after, status)."
    severity: WARNING
    paths:
      include:
        - src/ops/**
        - src/orchestrator/**
      exclude:
        - src/evidence/**
        - src/shared/wal.py
        - "**/extensions/PRJ-ENFORCEMENT-PACK/**"
        - "**/*test*"
    patterns:
      - pattern-regex: "validate_(?:transition|run_transition|node_transition)\\("
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-005"
      stage: v1_advisory
      rationale: "Flag state transition calls as advisory reminder to ensure evidence recording. Not all flagged sites are violations — review context."
