rules:
  - id: enf.v1.ep004.direct_write_text
    languages: [python]
    message: "EP-004 Allow-Path Hitchhiking: Use write_json_atomic() or write_text_atomic() instead of direct path.write_text(). Direct writes bypass atomic/fsync/WAL guarantees."
    severity: WARNING
    paths:
      include:
        - src/ops/**
        - src/orchestrator/**
        - src/shared/**
      exclude:
        - src/shared/utils.py
        - src/shared/wal.py
        - "**/extensions/PRJ-ENFORCEMENT-PACK/**"
        - "**/*test*"
        - "**/*contract*"
    patterns:
      - pattern-regex: "\\.write_text\\s*\\("
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-004"
      stage: v1_real
      rationale: "Detect direct path.write_text() calls that bypass atomic write and WAL guarantees in core orchestrator paths."
