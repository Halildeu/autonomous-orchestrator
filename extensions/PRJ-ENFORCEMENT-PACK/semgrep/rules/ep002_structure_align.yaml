rules:
  - id: enf.v1.ep002.structure_align
    languages: [generic]
    message: "EP-002 Structure Align: extension folder name should match extension_id casing (expected extensions/<extension_id>/)."
    severity: WARNING
    paths:
      include:
        - extensions/prj-github-ops/extension.manifest.v1.json
        - extensions/release-automation/extension.manifest.v1.json
      exclude:
        - docs/ARCHIVE/**
        - extensions/PRJ-ENFORCEMENT-PACK/semgrep/rules/**
    pattern-regex: '"extension_id"\s*:\s*"PRJ-(GITHUB-OPS|RELEASE-AUTOMATION)"'
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-002"
      stage: "v1_real"
      rationale: "Canonical extension manifests must live under extensions/PRJ-*/; legacy lowercase aliases are not allowed in the tracked tree."
