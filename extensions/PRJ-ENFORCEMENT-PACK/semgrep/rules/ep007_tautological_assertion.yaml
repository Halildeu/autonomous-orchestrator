rules:
  - id: enf.v1.ep007.tautological_literal
    languages: [typescript, javascript]
    message: "EP-007 Fake Test: Tautological assertion — literal compared to itself. Write assertions that test actual component behavior."
    severity: WARNING
    paths:
      include:
        - "**/*.test.tsx"
        - "**/*.test.ts"
        - "**/*.spec.tsx"
        - "**/*.spec.ts"
      exclude:
        - extensions/PRJ-ENFORCEMENT-PACK/**
        - node_modules/**
        - "**/fixtures/**"
    pattern-either:
      - pattern: expect(true).toBe(true)
      - pattern: expect(false).toBe(false)
      - pattern: expect(1).toBe(1)
      - pattern: expect(0).toBe(0)
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-007"
      tq_rule: "TQ-002"
      stage: v1_advisory
      rationale: "Detect tautological assertions that always pass regardless of component behavior. High determinism, low false-positive — candidate for early BLOCKED promotion."

  - id: enf.v1.ep007.toBeDefined_sole
    languages: [typescript, javascript]
    message: "EP-007 Fake Test: toBeDefined() as sole assertion is weak. Add behavioral checks."
    severity: INFO
    paths:
      include:
        - "**/*.test.tsx"
        - "**/*.test.ts"
        - "**/*.spec.tsx"
        - "**/*.spec.ts"
      exclude:
        - extensions/PRJ-ENFORCEMENT-PACK/**
        - node_modules/**
        - "**/fixtures/**"
    pattern-regex: "expect\\s*\\([^)]+\\)\\s*\\.\\s*toBeDefined\\s*\\(\\s*\\)\\s*;?\\s*$"
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-007"
      tq_rule: "TQ-002"
      stage: v1_advisory
      rationale: "toBeDefined alone is a weak assertion. Advisory until false-positive baseline established."
