rules:
  - id: enf.v1.ep010.forbidden_ui_lib_import
    languages: [typescript, javascript]
    message: "EP-010 Forbidden UI Library: Direct import of banned UI library detected. ALL UI components must come from @mfe/design-system."
    severity: ERROR
    paths:
      include:
        - "**/*.tsx"
        - "**/*.ts"
      exclude:
        - "**/node_modules/**"
        - "**/extensions/PRJ-ENFORCEMENT-PACK/**"
        - "**/web/packages/design-system/**"
        - "**/web/packages/x-charts/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/*.stories.*"
    pattern-either:
      - pattern-regex: "from\\s+['\"]antd[/'\"]"
      - pattern-regex: "from\\s+['\"]@ant-design/icons[/'\"]"
      - pattern-regex: "from\\s+['\"]@mui/material[/'\"]"
      - pattern-regex: "from\\s+['\"]@chakra-ui/react[/'\"]"
      - pattern-regex: "from\\s+['\"]recharts[/'\"]"
      - pattern-regex: "from\\s+['\"]@nivo/"
      - pattern-regex: "from\\s+['\"]victory[/'\"]"
      - pattern-regex: "from\\s+['\"]chart\\.js[/'\"]"
      - pattern-regex: "from\\s+['\"]d3[/'\"-]"
      - pattern-regex: "require\\s*\\(\\s*['\"](?:antd|@ant-design/icons|@mui/material|@chakra-ui/react|recharts|victory|chart\\.js)['\"]"
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-010"
      stage: v1_real
      policy_ref: "policies/policy_domain_conventions.v1.json#frontend.forbidden_imports"
      rationale: "Ban all forbidden UI libraries per SSOT policy. Zero tolerance — @mfe/design-system wrappers must be used instead."
