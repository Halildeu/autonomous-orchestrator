    languages: [python]
    message: "EP-001 Boundary Breach: prj_github_ops must not import prj_kernel_api (use adapter/port boundary)."
    severity: WARNING
    paths:
      include:
        - src/prj_github_ops/**/*.py
      exclude:
        - extensions/PRJ-ENFORCEMENT-PACK/semgrep/rules/**
