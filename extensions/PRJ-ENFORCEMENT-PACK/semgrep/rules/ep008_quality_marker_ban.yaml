rules:
  - id: enf.v1.ep008.quality_marker_ban
    languages: [typescript, javascript]
    message: "EP-008 Fake Test: Bulk-generation marker detected. These tests must be replaced with genuine test coverage. Zero tolerance."
    severity: ERROR
    paths:
      include:
        - "**/*.test.tsx"
        - "**/*.test.ts"
        - "**/*.spec.tsx"
        - "**/*.spec.ts"
      exclude:
        - extensions/PRJ-ENFORCEMENT-PACK/**
        - node_modules/**
    pattern-regex: "quality-edge-boost|auto-generated-test|test-scaffold|bulk-test-gen"
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-008"
      tq_rule: "TQ-006"
      stage: v1_real
      rationale: "Ban known fake-test generation markers. Zero tolerance — BLOCKED in all profiles."
