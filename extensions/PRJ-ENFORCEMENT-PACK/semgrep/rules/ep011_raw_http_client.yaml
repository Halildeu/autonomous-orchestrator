rules:
  - id: enf.v1.ep011.raw_fetch
    languages: [typescript, javascript]
    message: "EP-011 Raw HTTP Client: Direct fetch() call detected. Use @mfe/shared-http for consistent error handling, auth headers, and retry logic."
    severity: WARNING
    paths:
      include:
        - "web/apps/**/*.ts"
        - "web/apps/**/*.tsx"
        - "web/packages/**/*.ts"
        - "web/packages/**/*.tsx"
      exclude:
        - "**/node_modules/**"
        - "**/extensions/PRJ-ENFORCEMENT-PACK/**"
        - "**/web/packages/shared-http/**"
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/__mocks__/**"
        - "**/__tests__/**"
        - "**/*.stories.*"
    pattern-regex: "(?:window\\.)?fetch\\s*\\("
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-011"
      stage: v1_advisory
      rationale: "Raw fetch bypasses shared-http interceptors for auth, error handling, and retry. Advisory stage due to legitimate edge cases in service workers and test mocks."

  - id: enf.v1.ep011.raw_axios
    languages: [typescript, javascript]
    message: "EP-011 Raw HTTP Client: Direct axios import detected. Use @mfe/shared-http (httpClient) instead."
    severity: WARNING
    paths:
      include:
        - "web/apps/**/*.ts"
        - "web/apps/**/*.tsx"
        - "web/packages/**/*.ts"
        - "web/packages/**/*.tsx"
      exclude:
        - "**/node_modules/**"
        - "**/extensions/PRJ-ENFORCEMENT-PACK/**"
        - "**/web/packages/shared-http/**"
        - "**/*.test.*"
        - "**/*.spec.*"
    pattern-regex: "(?:import\\s+.*from\\s+['\"]axios['\"]|require\\s*\\(['\"]axios['\"]\\))"
    metadata:
      enforcement_pack: ENF_V1
      ep_id: "EP-011"
      stage: v1_advisory
      rationale: "Direct axios imports bypass shared-http wrapper. Advisory until codebase migration is complete."
