name: Web Playwright Smoke

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Hedef environment"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - prod
      mode:
        description: "ci: Seviye 1, nightly: Seviye 1+2"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - nightly
      suite:
        description: "Çalıştırılacak test kümesi"
        required: false
        default: "scenario-runner"
        type: choice
        options:
          - scenario-runner
          - authz-zanzibar
      soft_mode:
        description: "1: Soft mode (job kırma yok), 0: Hard mode (FAIL -> job fail)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      auth_mode:
        description: "Auth modu"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - token_injection
      readonly_enforce:
        description: "Readonly enforcement (0: kapalı, 1: açık)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      base_url:
        description: "Playwright baseUrl (örn: http://localhost:3000)"
        required: true
        default: ""

jobs:
  pw-smoke:
    if: ${{ inputs.env != 'stage' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Validate base_url
        run: |
          set -euo pipefail
          BASE_URL="${{ inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then
            echo "[pw-smoke] HATA: 'base_url' boş olamaz. Staging URL girin (örn: https://staging.example.com)."
            exit 1
          fi
          if [[ "$BASE_URL" == *localhost* ]] || [[ "$BASE_URL" == *127.0.0.1* ]]; then
            echo "[pw-smoke] HATA: CI'da localhost base_url kullanılamaz: $BASE_URL"
            exit 1
          fi

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Validate authz smoke secrets
        if: ${{ inputs.suite == 'authz-zanzibar' }}
        run: |
          set -euo pipefail
          if [ -z "${PW_REAL_USER_PASSWORD:-}" ]; then
            echo "[pw-smoke] HATA: authz-zanzibar için PW_REAL_USER_PASSWORD secret'ı zorunlu."
            exit 1
          fi
        env:
          PW_REAL_USER_PASSWORD: ${{ secrets.PW_REAL_USER_PASSWORD }}

      - name: Detect stage Keycloak endpoint
        if: ${{ inputs.suite == 'authz-zanzibar' }}
        run: |
          set -euo pipefail
          kc_container="$(docker ps --format '{{.Names}}' | awk '/keycloak/ { print; exit }')"
          if [[ -z "${kc_container}" ]]; then
            echo "[pw-smoke] HATA: çalışan keycloak container bulunamadı."
            docker ps --format '{{.Names}}'
            exit 1
          fi

          host_port="$(
            docker inspect -f '{{range $port, $bindings := .NetworkSettings.Ports}}{{if and (eq $port "8080/tcp") $bindings}}{{(index $bindings 0).HostPort}}{{end}}{{end}}' \
              "${kc_container}" 2>/dev/null || true
          )"
          if [[ -z "${host_port}" ]]; then
            host_port="8081"
          fi

          echo "PW_KEYCLOAK_URL=http://127.0.0.1:${host_port}" >> "${GITHUB_ENV}"
          echo "[pw-smoke] keycloak container=${kc_container} host_port=${host_port}"

      - name: Run Playwright smoke
        run: |
          set -euo pipefail
          if [ "${{ inputs.suite }}" = "authz-zanzibar" ]; then
            pnpm run pw:authz-zanzibar
          elif [ "${{ inputs.mode }}" = "nightly" ]; then
            pnpm run pw:nightly
          else
            pnpm run pw:ci
          fi
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PW_SOFT_MODE: ${{ inputs.soft_mode || '0' }}
          PW_AUTH_MODE: ${{ inputs.auth_mode || 'none' }}
          PW_READONLY_ENFORCE: ${{ inputs.readonly_enforce || '0' }}
          KEYCLOAK_TOKEN_URL: ${{ secrets.KEYCLOAK_TOKEN_URL }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SCOPE: ${{ secrets.KEYCLOAK_SCOPE }}
          PW_REAL_USER_EMAIL: ${{ secrets.PW_REAL_USER_EMAIL }}
          PW_REAL_USER_PASSWORD: ${{ secrets.PW_REAL_USER_PASSWORD }}

      - name: Upload reports (pw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-reports
          path: web/test-results/pw

  pw-smoke-stage:
    if: ${{ inputs.env == 'stage' }}
    runs-on:
      - self-hosted
      - linux
      - x64
      - stage-backend
    environment: stage

    steps:
      - name: Repair stage workspace ownership
        run: |
          set -euo pipefail
          image="platform-playwright-smoke:chromium-bookworm"
          if docker image inspect "${image}" >/dev/null 2>&1; then
            docker run --rm \
              -v "${GITHUB_WORKSPACE}:/work" \
              "${image}" \
              bash -lc 'find /work -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
          else
            echo "[pw-smoke] cleanup image henuz yok; docker cleanup atlandi."
          fi

      - name: Checkout repository
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          if [[ -d "/home/halil/platform/repo/web" ]]; then
            echo "[pw-smoke] host checkout bulundu; web agaci lokal repo uzerinden kopyalaniyor."
            mkdir -p "${GITHUB_WORKSPACE}/web"
            cp -R "/home/halil/platform/repo/web/." "${GITHUB_WORKSPACE}/web/"
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          archive="${tmpdir}/repo.tar.gz"

          curl -fsSL --connect-timeout 20 --max-time 180 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/tarball/${GH_SHA}" \
            -o "${archive}"

          tar -xzf "${archive}" -C "${tmpdir}"
          src_dir="$(find "${tmpdir}" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [[ -z "${src_dir}" || ! -d "${src_dir}/web" ]]; then
            echo "[pw-smoke] HATA: indirilen arsiv icinde web dizini bulunamadi."
            find "${tmpdir}" -mindepth 1 -maxdepth 2 -type d | sort || true
            exit 1
          fi

          rm -rf "${GITHUB_WORKSPACE}/web"
          mkdir -p "${GITHUB_WORKSPACE}/web"
          cp -R "${src_dir}/web/." "${GITHUB_WORKSPACE}/web/"

      - name: Overlay branch authz smoke spec
        if: ${{ inputs.suite == 'authz-zanzibar' }}
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/web/tests/playwright"
          cat > "${GITHUB_WORKSPACE}/web/tests/playwright/authz.zanzibar.spec.ts" <<'EOF'
          import { test, expect } from '@playwright/test';
          import { authenticateAndNavigate } from './utils/auth';

          type AuthzSnapshot = {
            userId?: string;
            permissions?: string[];
            allowedModules?: string[];
            superAdmin?: boolean;
          };

          type ParsedTokenEndpoint = {
            baseUrl?: string;
            realm?: string;
          };

          const parseKeycloakTokenUrl = (rawUrl: string): ParsedTokenEndpoint => {
            if (!rawUrl) {
              return {};
            }

            try {
              const url = new URL(rawUrl);
              const match = url.pathname.match(/^(.*)\/realms\/([^/]+)\/protocol\/openid-connect\/token$/);

              if (!match) {
                return {};
              }

              const prefix = match[1] ?? '';
              const realm = match[2]?.trim();
              const baseUrl = `${url.origin}${prefix}`.replace(/\/$/, '');

              return {
                baseUrl: baseUrl || url.origin,
                realm,
              };
            } catch {
              return {};
            }
          };

          const derivedKeycloak = parseKeycloakTokenUrl((process.env.KEYCLOAK_TOKEN_URL ?? '').trim());
          const KEYCLOAK_URL = (process.env.PW_KEYCLOAK_URL ?? derivedKeycloak.baseUrl ?? 'http://localhost:8081').trim();
          const KEYCLOAK_REALM = (process.env.PW_KEYCLOAK_REALM ?? derivedKeycloak.realm ?? 'serban').trim();
          const KEYCLOAK_CLIENT_ID = (process.env.PW_KEYCLOAK_CLIENT_ID ?? process.env.KEYCLOAK_CLIENT_ID ?? 'frontend').trim();
          const KEYCLOAK_CLIENT_SECRET = (process.env.PW_KEYCLOAK_CLIENT_SECRET ?? process.env.KEYCLOAK_CLIENT_SECRET ?? '').trim();
          const KEYCLOAK_SCOPE = (process.env.PW_KEYCLOAK_SCOPE ?? process.env.KEYCLOAK_SCOPE ?? 'openid').trim();
          const TEST_EMAIL = (process.env.PW_REAL_USER_EMAIL ?? 'user3@example.com').trim();
          const TEST_PASSWORD = (process.env.PW_REAL_USER_PASSWORD ?? '').trim();

          const issuePasswordGrantToken = async (email: string, password: string): Promise<string> => {
            const body = new URLSearchParams();
            body.set('grant_type', 'password');
            body.set('client_id', KEYCLOAK_CLIENT_ID);
            body.set('username', email);
            body.set('password', password);
            if (KEYCLOAK_CLIENT_SECRET) {
              body.set('client_secret', KEYCLOAK_CLIENT_SECRET);
            }
            if (KEYCLOAK_SCOPE) {
              body.set('scope', KEYCLOAK_SCOPE);
            }

            const response = await fetch(
              `${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token`,
              {
                method: 'POST',
                headers: { 'content-type': 'application/x-www-form-urlencoded' },
                body: body.toString(),
              },
            );

            const payload = await response.json().catch(() => ({}));
            const token = typeof payload?.access_token === 'string' ? payload.access_token.trim() : '';

            expect(response.ok, `Keycloak token endpoint başarısız oldu: ${response.status}`).toBeTruthy();
            expect(token.length > 0, 'Restricted-user token alınamadı').toBeTruthy();

            return token;
          };

          const fetchAuthzSnapshot = async (root: string, token: string): Promise<AuthzSnapshot> => {
            const candidates = ['/v1/authz/me', '/api/v1/authz/me'];
            let lastStatus = 0;

            for (const path of candidates) {
              const response = await fetch(`${root}${path}`, {
                headers: {
                  Authorization: `Bearer ${token}`,
                },
              });

              lastStatus = response.status;
              if (!response.ok) {
                continue;
              }

              return (await response.json().catch(() => ({}))) as AuthzSnapshot;
            }

            expect(false, `authz snapshot endpoint'i bulunamadı. son HTTP durum: ${lastStatus}`).toBeTruthy();
            return {} as AuthzSnapshot;
          };

          test.describe('Zanzibar authz live smoke', () => {
            test('restricted user yalnız yetkili modülleri görür ve theme alanında unauthorized alır', async ({ page, baseURL }) => {
              test.skip(!TEST_PASSWORD, 'PW_REAL_USER_PASSWORD tanımlı değil.');

              const root = baseURL ?? 'http://localhost:3000';
              const token = await issuePasswordGrantToken(TEST_EMAIL, TEST_PASSWORD);
              const authz = await fetchAuthzSnapshot(root, token);
              const allowedModules = Array.isArray(authz.allowedModules)
                ? authz.allowedModules
                : (Array.isArray(authz.permissions) ? authz.permissions : []);

              expect(authz.superAdmin).toBeFalsy();
              if (authz.userId !== undefined && authz.userId !== null) {
                expect(String(authz.userId).trim().length > 0, 'userId boş dönmemeli').toBeTruthy();
              }
              expect(allowedModules).toEqual(expect.arrayContaining(['ACCESS', 'AUDIT', 'REPORT']));
              expect(allowedModules).not.toContain('THEME');

              const previousToken = process.env.PW_TEST_TOKEN;
              process.env.PW_TEST_TOKEN = token;

              try {
                await authenticateAndNavigate(page, baseURL, '/access/roles', allowedModules);
                await expect(page).toHaveURL(/\/access\/roles/);
                await expect(page.locator('.ag-root')).toBeVisible({ timeout: 30_000 });

                await page.goto(`${root}/admin/themes`, { waitUntil: 'domcontentloaded' });
                await expect(page).toHaveURL(/\/unauthorized/, { timeout: 30_000 });
                await expect(page.getByRole('heading', { name: /Erişim Yetkiniz Bulunmuyor|You do not have access/i })).toBeVisible();
              } finally {
                if (typeof previousToken === 'string') {
                  process.env.PW_TEST_TOKEN = previousToken;
                } else {
                  delete process.env.PW_TEST_TOKEN;
                }
              }
            });
          });
          EOF

      - name: Validate base_url
        run: |
          set -euo pipefail
          BASE_URL="${{ inputs.base_url }}"
          if [ -z "$BASE_URL" ]; then
            echo "[pw-smoke] HATA: 'base_url' boş olamaz. Staging URL girin (örn: http://10.9.10.53:5544)."
            exit 1
          fi

      - name: Validate authz smoke secrets
        if: ${{ inputs.suite == 'authz-zanzibar' }}
        run: |
          set -euo pipefail
          if [ -z "${PW_REAL_USER_PASSWORD:-}" ]; then
            echo "[pw-smoke] HATA: authz-zanzibar için PW_REAL_USER_PASSWORD secret'ı zorunlu."
            exit 1
          fi
        env:
          PW_REAL_USER_PASSWORD: ${{ secrets.PW_REAL_USER_PASSWORD }}

      - name: Detect stage Keycloak endpoint
        if: ${{ inputs.suite == 'authz-zanzibar' }}
        run: |
          set -euo pipefail
          kc_container="$(docker ps --format '{{.Names}}' | awk '/keycloak/ { print; exit }')"
          if [[ -z "${kc_container}" ]]; then
            echo "[pw-smoke] HATA: çalışan keycloak container bulunamadı."
            docker ps --format '{{.Names}}'
            exit 1
          fi

          host_port="$(
            docker inspect -f '{{range $port, $bindings := .NetworkSettings.Ports}}{{if and (eq $port "8080/tcp") $bindings}}{{(index $bindings 0).HostPort}}{{end}}{{end}}' \
              "${kc_container}" 2>/dev/null || true
          )"
          if [[ -z "${host_port}" ]]; then
            host_port="8081"
          fi

          echo "PW_KEYCLOAK_URL=http://127.0.0.1:${host_port}" >> "${GITHUB_ENV}"
          echo "[pw-smoke] keycloak container=${kc_container} host_port=${host_port}"

      - name: Detect system browser
        id: detect_browser
        run: |
          set -euo pipefail
          for bin in \
            "$(command -v google-chrome-stable || true)" \
            "$(command -v google-chrome || true)" \
            "$(command -v chromium || true)" \
            "$(command -v chromium-browser || true)" \
            "$(command -v microsoft-edge-stable || true)" \
            "$(command -v microsoft-edge || true)" \
            /usr/bin/google-chrome \
            /usr/bin/google-chrome-stable \
            /usr/bin/chromium \
            /usr/bin/chromium-browser \
            /usr/bin/microsoft-edge \
            /usr/bin/microsoft-edge-stable \
            /snap/bin/chromium; do
            if [ -n "${bin}" ] && [ -x "${bin}" ]; then
              echo "PLAYWRIGHT_EXECUTABLE_PATH=${bin}" >> "${GITHUB_ENV}"
              echo "executable_path=${bin}" >> "${GITHUB_OUTPUT}"
              echo "[pw-smoke] sistem tarayicisi bulundu: ${bin}"
              exit 0
            fi
          done
          echo "executable_path=" >> "${GITHUB_OUTPUT}"
          echo "[pw-smoke] sistem tarayicisi bulunamadi; Docker fallback kullanilacak."

      - name: Build local Playwright smoke image
        if: ${{ steps.detect_browser.outputs.executable_path == '' }}
        run: |
          set -euo pipefail
          image="platform-playwright-smoke:chromium-bookworm"
          echo "[pw-smoke] Docker fallback image: ${image}"
          if docker image inspect "${image}" >/dev/null 2>&1; then
            echo "[pw-smoke] yerel smoke image zaten mevcut."
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          printf '%s\n' \
            'FROM node:20-bookworm' \
            'RUN apt-get update && apt-get install -y --no-install-recommends chromium ca-certificates && rm -rf /var/lib/apt/lists/*' \
            > "${tmpdir}/Dockerfile"

          if timeout 900 docker build -t "${image}" "${tmpdir}"
          then
            exit 0
          fi

          echo "[pw-smoke] HATA: yerel smoke image olusturma basarisiz oldu. Runner tanisi basliyor."
          echo "--- docker version ---"
          docker version || true
          echo "--- docker info ---"
          docker info || true
          echo "--- docker system df ---"
          docker system df || true
          echo "--- disk usage ---"
          df -h . /var/lib/docker || true
          echo "--- resolver check (docker.io) ---"
          getent hosts registry-1.docker.io || true
          echo "--- registry probe (docker.io) ---"
          curl -I --max-time 20 https://registry-1.docker.io/v2/ || true
          exit 1

      - name: Run Playwright smoke
        run: |
          set -euo pipefail
          cmd="npx -y pnpm@9.15.9 run pw:ci"
          if [ "${INPUT_SUITE}" = "authz-zanzibar" ]; then
            cmd="npx -y pnpm@9.15.9 run pw:authz-zanzibar"
          elif [ "${INPUT_MODE}" = "nightly" ]; then
            cmd="npx -y pnpm@9.15.9 run pw:nightly"
          fi

          if [ -n "${PLAYWRIGHT_EXECUTABLE_PATH:-}" ]; then
            cd web
            npx -y pnpm@9.15.9 install --frozen-lockfile
            ${cmd}
            exit 0
          fi

          image="platform-playwright-smoke:chromium-bookworm"
          export PLAYWRIGHT_EXECUTABLE_PATH="/usr/bin/chromium"
          docker run --rm \
            --network host \
            --ipc=host \
            --user "$(id -u):$(id -g)" \
            -e CI=1 \
            -e HOME=/tmp/pw-home \
            -e XDG_CACHE_HOME=/tmp/pw-cache \
            -e NPM_CONFIG_CACHE=/tmp/npm-cache \
            -e PNPM_HOME=/tmp/pnpm-home \
            -e PLAYWRIGHT_BASE_URL \
            -e PLAYWRIGHT_EXECUTABLE_PATH \
            -e PW_KEYCLOAK_URL \
            -e PW_KEYCLOAK_CLIENT_ID \
            -e PW_KEYCLOAK_CLIENT_SECRET \
            -e PW_KEYCLOAK_SCOPE \
            -e PW_SOFT_MODE \
            -e PW_AUTH_MODE \
            -e PW_READONLY_ENFORCE \
            -e KEYCLOAK_TOKEN_URL \
            -e KEYCLOAK_CLIENT_ID \
            -e KEYCLOAK_CLIENT_SECRET \
            -e KEYCLOAK_SCOPE \
            -e PW_REAL_USER_EMAIL \
            -e PW_REAL_USER_PASSWORD \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work/web \
            "${image}" \
            bash -lc "mkdir -p \"\$HOME\" \"\$XDG_CACHE_HOME\" \"\$NPM_CONFIG_CACHE\" \"\$PNPM_HOME\" && npx -y pnpm@9.15.9 install --frozen-lockfile && ${cmd}"
        env:
          INPUT_SUITE: ${{ inputs.suite }}
          INPUT_MODE: ${{ inputs.mode }}
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PW_SOFT_MODE: ${{ inputs.soft_mode || '0' }}
          PW_AUTH_MODE: ${{ inputs.auth_mode || 'none' }}
          PW_READONLY_ENFORCE: ${{ inputs.readonly_enforce || '0' }}
          PW_KEYCLOAK_CLIENT_ID: admin-cli
          PW_KEYCLOAK_CLIENT_SECRET: ''
          PW_KEYCLOAK_SCOPE: openid
          KEYCLOAK_TOKEN_URL: ${{ secrets.KEYCLOAK_TOKEN_URL }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KEYCLOAK_SCOPE: ${{ secrets.KEYCLOAK_SCOPE }}
          PW_REAL_USER_EMAIL: ${{ secrets.PW_REAL_USER_EMAIL }}
          PW_REAL_USER_PASSWORD: ${{ secrets.PW_REAL_USER_PASSWORD }}

      - name: Upload reports (pw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-reports-stage
          path: web/test-results/pw
