name: gate-policy-dry-run
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  policy-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Policy dry-run simulation (fixtures)
        run: |
          python ci/policy_dry_run.py --fixtures fixtures/envelopes --out sim_report.json

      - name: Policy diff simulation (baseline vs candidate)
        run: |
          python ci/policy_diff_sim.py --source both --fixtures fixtures/envelopes --evidence evidence --baseline HEAD~1 --out policy_diff_report.json

      - name: Generate Markdown policy report (PR review)
        run: |
          mkdir -p .cache/policy_check
          cp sim_report.json .cache/policy_check/sim_report.json
          cp policy_diff_report.json .cache/policy_check/policy_diff_report.json
          python -m src.ops.policy_report --in .cache/policy_check --out .cache/policy_check/POLICY_REPORT.md

      - name: Enforce deprecation warning gate
        run: |
          python -m src.ops.manage policy-check --source both --outdir .cache/policy_check --max-deprecation-warnings 1

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-dry-run-report
          path: sim_report.json

      - name: Upload diff report artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-diff-report
          path: policy_diff_report.json

      - name: Upload policy review report (Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: policy-review-report-md
          path: .cache/policy_check/POLICY_REPORT.md
