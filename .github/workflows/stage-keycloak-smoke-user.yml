name: Stage Keycloak Smoke User

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "İşlem modu"
        required: true
        default: "inspect"
        type: choice
        options:
          - inspect
          - inspect-client
          - probe-password-grant
          - reset-password
      user_email:
        description: "Smoke kullanıcı e-postası"
        required: true
        default: "user3@example.com"
        type: string
      client_id:
        description: "Override edilecek Keycloak client_id"
        required: false
        default: ""
        type: string
      realm:
        description: "Keycloak realm"
        required: false
        default: "serban"
        type: string

permissions:
  contents: read

jobs:
  manage-smoke-user:
    runs-on:
      - self-hosted
      - linux
      - x64
      - stage-backend
    environment: stage

    steps:
      - name: Inspect or reset smoke user
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          TARGET_EMAIL: ${{ inputs.user_email }}
          TARGET_CLIENT_ID: ${{ inputs.client_id }}
          REALM_NAME: ${{ inputs.realm }}
          TARGET_PASSWORD: ${{ secrets.PW_REAL_USER_PASSWORD }}
          KC_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KC_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          KC_SCOPE: ${{ secrets.KEYCLOAK_SCOPE }}
        run: |
          set -euo pipefail
          set +x

          require_cmd() {
            if ! command -v "$1" >/dev/null 2>&1; then
              echo "[kc] HATA: '$1' komutu bulunamadı."
              exit 1
            fi
          }

          require_cmd docker
          require_cmd curl
          require_cmd python3

          urlencode() {
            python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$1"
          }

          kc_container="$(docker ps --format '{{.Names}}' | awk '/keycloak/ { print; exit }')"
          if [[ -z "${kc_container}" ]]; then
            echo "[kc] HATA: çalışan keycloak container bulunamadı."
            docker ps --format '{{.Names}}'
            exit 1
          fi

          echo "[kc] container=${kc_container}"

          host_port="$(
            docker inspect -f '{{range $port, $bindings := .NetworkSettings.Ports}}{{if and (eq $port "8080/tcp") $bindings}}{{(index $bindings 0).HostPort}}{{end}}{{end}}' \
              "${kc_container}" 2>/dev/null || true
          )"
          if [[ -z "${host_port}" ]]; then
            host_port="8081"
          fi

          keycloak_base="http://127.0.0.1:${host_port}"
          admin_user=""
          admin_pass=""

          load_env_pair() {
            local pair="$1"
            case "${pair}" in
              KEYCLOAK_ADMIN=*) admin_user="${pair#*=}" ;;
              KC_ADMIN=*) admin_user="${pair#*=}" ;;
              KEYCLOAK_USER=*) admin_user="${pair#*=}" ;;
              KEYCLOAK_ADMIN_PASSWORD=*) admin_pass="${pair#*=}" ;;
              KC_ADMIN_PASSWORD=*) admin_pass="${pair#*=}" ;;
              KEYCLOAK_PASSWORD=*) admin_pass="${pair#*=}" ;;
            esac
          }

          if [[ -f /opt/app/.env ]]; then
            while IFS= read -r line; do
              [[ -n "${line}" ]] || continue
              load_env_pair "${line}"
            done < /opt/app/.env
          fi

          if [[ -z "${admin_user}" || -z "${admin_pass}" ]]; then
            while IFS= read -r env_line; do
              load_env_pair "${env_line}"
            done < <(docker inspect -f '{{range .Config.Env}}{{println .}}{{end}}' "${kc_container}")
          fi

          if [[ -z "${admin_user}" ]]; then
            admin_user="admin"
          fi
          if [[ -z "${admin_pass}" ]]; then
            admin_pass="admin"
          fi

          echo "::add-mask::${admin_user}"
          echo "::add-mask::${admin_pass}"
          if [[ -n "${TARGET_PASSWORD:-}" ]]; then
            echo "::add-mask::${TARGET_PASSWORD}"
          fi

          admin_token="$(
            curl -sS -X POST "${keycloak_base}/realms/master/protocol/openid-connect/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=password" \
              -d "client_id=admin-cli" \
              -d "username=${admin_user}" \
              -d "password=${admin_pass}" | python3 -c 'import json,sys; payload=(lambda: json.load(sys.stdin))(); print(payload.get("access_token",""))' 2>/dev/null || true
          )"

          if [[ -z "${admin_token}" ]]; then
            echo "[kc] HATA: admin token alınamadı."
            exit 1
          fi

          effective_client_id="${TARGET_CLIENT_ID:-${KC_CLIENT_ID:-}}"

          if [[ "${MODE}" == "inspect-client" ]]; then
            if [[ -z "${effective_client_id}" ]]; then
              echo "[kc] HATA: inspect-client için client_id input'u veya KEYCLOAK_CLIENT_ID secret'ı zorunlu."
              exit 1
            fi

            client_q="$(urlencode "${effective_client_id}")"
            client_payload="$(
              curl -sS \
                -H "Authorization: Bearer ${admin_token}" \
                "${keycloak_base}/admin/realms/${REALM_NAME}/clients?clientId=${client_q}"
            )"

            client_count="$(
              printf '%s' "${client_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); print(len(payload) if isinstance(payload,list) else 0)' 2>/dev/null || printf '0'
            )"
            if [[ "${client_count}" -eq 0 ]]; then
              echo "[kc] HATA: client bulunamadı: ${effective_client_id}"
              all_clients_payload="$(
                curl -sS \
                  -H "Authorization: Bearer ${admin_token}" \
                  "${keycloak_base}/admin/realms/${REALM_NAME}/clients?max=200"
              )"
              printf '%s' "${all_clients_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); ids=[str(item.get("clientId","")).strip() for item in payload if isinstance(item,dict) and str(item.get("clientId","")).strip()]; ids=ids[:60]; print("[kc] available_client_ids=" + ", ".join(ids))'
              exit 1
            fi

            printf '%s' "${client_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); client=payload[0] if isinstance(payload,list) and payload else {}; print("[kc] clientId=" + str(client.get("clientId","unknown"))); print("[kc] publicClient=" + str(client.get("publicClient"))); print("[kc] directAccessGrantsEnabled=" + str(client.get("directAccessGrantsEnabled"))); print("[kc] serviceAccountsEnabled=" + str(client.get("serviceAccountsEnabled"))); print("[kc] standardFlowEnabled=" + str(client.get("standardFlowEnabled")));'
            exit 0
          fi

          if [[ "${MODE}" == "probe-password-grant" ]]; then
            if [[ -z "${effective_client_id}" || -z "${TARGET_PASSWORD:-}" ]]; then
              echo "[kc] HATA: probe-password-grant için client_id input'u veya KEYCLOAK_CLIENT_ID secret'ı ve PW_REAL_USER_PASSWORD zorunlu."
              exit 1
            fi

            token_cmd=(curl -sS -w '\n%{http_code}' -X POST "${keycloak_base}/realms/${REALM_NAME}/protocol/openid-connect/token" -H "Content-Type: application/x-www-form-urlencoded" -d "grant_type=password" -d "client_id=${effective_client_id}" -d "username=${TARGET_EMAIL}" -d "password=${TARGET_PASSWORD}" -d "scope=${KC_SCOPE:-openid}")
            if [[ -n "${KC_CLIENT_SECRET:-}" && -z "${TARGET_CLIENT_ID:-}" ]]; then
              token_cmd+=(-d "client_secret=${KC_CLIENT_SECRET}")
            fi
            token_response="$("${token_cmd[@]}")"
            status="$(printf '%s' "${token_response}" | tail -n 1)"
            body="$(printf '%s' "${token_response}" | sed '$d')"
            printf '%s' "${body}" | python3 -c 'import json,sys; raw=sys.stdin.read().strip(); payload=json.loads(raw) if raw else {}; error=str(payload.get("error","")).strip() or "-"; desc=str(payload.get("error_description","")).strip() or "-"; token=str(payload.get("access_token","")).strip(); print("[kc] token_error=" + error); print("[kc] token_error_description=" + desc); print("[kc] access_token_present=" + ("yes" if token else "no"))'
            echo "[kc] token_status=${status}"
            if [[ "${status}" != "200" ]]; then
              exit 1
            fi
            exit 0
          fi

          email_q="$(urlencode "${TARGET_EMAIL}")"
          user_payload="$(
            curl -sS \
              -H "Authorization: Bearer ${admin_token}" \
              "${keycloak_base}/admin/realms/${REALM_NAME}/users?email=${email_q}"
          )"

          user_count="$(
            printf '%s' "${user_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); print(len(payload) if isinstance(payload,list) else 0)' 2>/dev/null || printf '0'
          )"
          echo "[kc] realm=${REALM_NAME} user_count=${user_count}"

          if [[ "${user_count}" -eq 0 ]]; then
            if [[ "${MODE}" != "reset-password" ]]; then
              echo "[kc] HATA: smoke kullanıcı bulunamadı: ${TARGET_EMAIL}"
              exit 1
            fi

            create_payload="$(
              TARGET_EMAIL="${TARGET_EMAIL}" python3 -c 'import json,os; email=os.environ["TARGET_EMAIL"]; print(json.dumps({"username":email,"email":email,"enabled":True,"emailVerified":True}))'
            )"

            create_status="$(
              curl -sS -o /dev/null -w '%{http_code}' \
                -H "Authorization: Bearer ${admin_token}" \
                -H "Content-Type: application/json" \
                -X POST "${keycloak_base}/admin/realms/${REALM_NAME}/users" \
                -d "${create_payload}"
            )"

            if [[ "${create_status}" != "201" && "${create_status}" != "409" ]]; then
              echo "[kc] HATA: smoke kullanıcı oluşturulamadı (HTTP ${create_status})."
              exit 1
            fi

            user_payload="$(
              curl -sS \
                -H "Authorization: Bearer ${admin_token}" \
                "${keycloak_base}/admin/realms/${REALM_NAME}/users?email=${email_q}"
            )"

            user_count="$(
              printf '%s' "${user_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); print(len(payload) if isinstance(payload,list) else 0)' 2>/dev/null || printf '0'
            )"
            echo "[kc] created-or-found user_count=${user_count}"

            if [[ "${user_count}" -eq 0 ]]; then
              echo "[kc] HATA: oluşturma sonrası smoke kullanıcı hâlâ bulunamadı: ${TARGET_EMAIL}"
              exit 1
            fi
          fi

          user_id="$(
            printf '%s' "${user_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); first=payload[0] if isinstance(payload,list) and payload else {}; print(first.get("id",""))' 2>/dev/null || true
          )"
          username="$(
            printf '%s' "${user_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); first=payload[0] if isinstance(payload,list) and payload else {}; print(first.get("username",""))' 2>/dev/null || true
          )"
          enabled="$(
            printf '%s' "${user_payload}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); first=payload[0] if isinstance(payload,list) and payload else {}; value=first.get("enabled",""); print(str(value).lower() if isinstance(value,bool) else value)' 2>/dev/null || true
          )"

          echo "[kc] user=${username:-unknown} enabled=${enabled:-unknown}"

          if [[ "${MODE}" == "inspect" ]]; then
            echo "[kc] OK: smoke kullanıcı erişilebilir."
            exit 0
          fi

          if [[ -z "${TARGET_PASSWORD:-}" ]]; then
            echo "[kc] HATA: reset-password için stage secret PW_REAL_USER_PASSWORD zorunlu."
            exit 1
          fi

          reset_payload="$(
            TARGET_PASSWORD="${TARGET_PASSWORD}" python3 -c 'import json,os; print(json.dumps({"type":"password","temporary":False,"value":os.environ["TARGET_PASSWORD"]}))'
          )"

          status="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${admin_token}" \
              -H "Content-Type: application/json" \
              -X PUT "${keycloak_base}/admin/realms/${REALM_NAME}/users/${user_id}/reset-password" \
              -d "${reset_payload}"
          )"

          if [[ "${status}" != "204" ]]; then
            echo "[kc] HATA: parola reset başarısız (HTTP ${status})."
            exit 1
          fi

          echo "[kc] OK: smoke kullanıcı parolası güncellendi."
