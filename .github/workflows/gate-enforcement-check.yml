name: gate-enforcement-check
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  enforcement-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install semgrep==1.146.0

      - name: Enforcement check (PR advisory)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          python3 -m src.ops.manage enforcement-check --profile strict --baseline git:HEAD~1 --outdir .cache/ws_customer_default/.cache/reports/enf_ci

      - name: Enforcement check (main strict)
        if: github.event_name != 'pull_request'
        run: |
          python3 -m src.ops.manage enforcement-check --profile strict --baseline git:HEAD~1 --outdir .cache/ws_customer_default/.cache/reports/enf_ci

      - name: Upload enforcement evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enforcement-check-evidence
          path: .cache/ws_customer_default/.cache/reports/enf_ci
          if-no-files-found: error

