name: gate-schema
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    env:
      SUPPLY_CHAIN_SIGNING_KEY: ${{ secrets.SUPPLY_CHAIN_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate JSON schemas + instances
        run: |
          python ci/validate_schemas.py

      - name: Validate smoke root cause taxonomy contract
        run: |
          python src/ops/smoke_root_cause_contract_test.py

      - name: Validate phase-all blocker aggregation contract
        run: |
          python src/ops/phase_all_blocking_reasons_contract_test.py

      - name: Validate pack manifests (warn-only for soft conflicts)
        run: |
          python ci/validate_pack_manifest.py --out .cache/pack_validation/report.json

      - name: Upload pack validation report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pack-validation-report
          path: .cache/pack_validation/report.json
          if-no-files-found: error

      - name: Run smoke test (local runner + policy dry-run)
        run: |
          python -m ci.smoke_test
      
      - name: Run full smoke (ci_smoke skipped by default)
        env:
          SMOKE_FULL_INCLUDE_CI: "0"
        run: |
          python -m src.ops.manage smoke --level full

      - name: Smoke root cause summary (taxonomy)
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from jsonschema import Draft202012Validator

          schema_path = Path("schemas/smoke-root-cause-report.schema.v1.json")
          report_path = Path(".cache/reports/smoke_root_cause_report.v1.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          if not schema_path.exists():
            summary_path.open("a", encoding="utf-8").write("Smoke root cause: schema missing\n")
            raise SystemExit(1)
          if not report_path.exists():
            summary_path.open("a", encoding="utf-8").write("Smoke root cause: report missing\n")
            raise SystemExit(1)

          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          report = json.loads(report_path.read_text(encoding="utf-8"))
          validator = Draft202012Validator(schema)
          errors = sorted(validator.iter_errors(report), key=lambda e: e.json_path)
          if errors:
            first = errors[0]
            where = first.json_path or "$"
            summary_path.open("a", encoding="utf-8").write(
              f"Smoke root cause: schema invalid at {where}: {first.message}\n"
            )
            raise SystemExit(1)

          msg = (
            f"Smoke root cause: status={report.get('status')} "
            f"code={report.get('root_error_code')} "
            f"severity={report.get('root_error_severity')} "
            f"category={report.get('root_error_category')} "
            f"source={report.get('classification_source')} "
            f"path={report_path.as_posix()}\n"
          )
          summary_path.open("a", encoding="utf-8").write(msg)
          print(msg.strip())
          PY

      - name: Script budget guardrails (soft=warn, hard=fail)
        run: |
          python ci/check_script_budget.py --out .cache/script_budget/report.json

      - name: Upload smoke root cause report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-root-cause-report
          path: .cache/reports/smoke_root_cause_report.v1.json
          if-no-files-found: error

      - name: Upload script budget report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: script-budget-report
          path: .cache/script_budget/report.json
          if-no-files-found: error

      - name: Repo hygiene report (warn-only)
        if: always()
        continue-on-error: true
        run: |
          python -m src.ops.manage repo-hygiene --mode report --out .cache/repo_hygiene/report.json

      - name: Doc graph report (warn-only)
        if: always()
        continue-on-error: true
        run: |
          python -m src.ops.manage doc-graph --workspace-root . --mode report --out .cache/reports/doc_graph_report.v1.json

      - name: Doc graph summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path(".cache/reports/doc_graph_report.v1.json")
          summary = Path("${GITHUB_STEP_SUMMARY}")
          if not report_path.exists():
              summary.open("a", encoding="utf-8").write("Doc graph: report missing\n")
              raise SystemExit(0)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          status = report.get("status", "UNKNOWN")
          counts = report.get("counts", {}) if isinstance(report, dict) else {}
          msg = (
              f"Doc graph: status={status} "
              f"broken_refs={counts.get('broken_refs', 0)} "
              f"orphan_critical={counts.get('orphan_critical', 0)} "
              f"ambiguity={counts.get('ambiguity', 0)}\n"
          )
          summary.open("a", encoding="utf-8").write(msg)
          PY

      - name: Repo hygiene summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path(".cache/repo_hygiene/report.json")
          summary = Path("${GITHUB_STEP_SUMMARY}")
          if not report_path.exists():
              summary.open("a", encoding="utf-8").write("Repo hygiene: report missing\n")
              raise SystemExit(0)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          status = report.get("status", "UNKNOWN")
          summary_data = report.get("summary", {}) if isinstance(report, dict) else {}
          msg = (
              f"Repo hygiene: status={status} "
              f"unexpected_dirs={summary_data.get('unexpected_top_level_dirs', 0)} "
              f"tracked_generated={summary_data.get('tracked_generated_files', 0)} "
              f"untracked_generated_dirs={summary_data.get('untracked_generated_dirs', 0)}\n"
          )
          summary.open("a", encoding="utf-8").write(msg)
          PY

      - name: Upload repo hygiene report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-hygiene-report
          path: .cache/repo_hygiene/report.json
          if-no-files-found: warn

      - name: Upload doc graph report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-graph-report
          path: .cache/reports/doc_graph_report.v1.json
          if-no-files-found: warn

      - name: Evidence integrity verify (newest run)
        run: |
          RUN_DIR=$(python - <<'PY'
          from pathlib import Path
          import sys

          evidence = Path("evidence")
          summaries = list(evidence.rglob("summary.json"))
          if not summaries:
              print("No evidence summaries found for integrity verify.")
              sys.exit(1)

          summaries.sort(key=lambda p: p.stat().st_mtime, reverse=True)
          print(summaries[0].parent.as_posix())
          PY
          )
          echo "Integrity verify: ${RUN_DIR}"
          python -m src.evidence.integrity_verify --run "${RUN_DIR}"

      - name: Reaper (dry-run retention report)
        run: |
          python -m src.ops.reaper --dry-run true --out reaper_report_ci.json

      - name: Upload reaper report artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper-report-ci
          path: reaper_report_ci.json

      - name: Upload policy-check outputs (if present)
        uses: actions/upload-artifact@v4
        with:
          name: policy-check-outputs
          path: .cache/policy_check/
          if-no-files-found: ignore

      - name: Supply chain secret preflight
        run: |
          if [ -z "${SUPPLY_CHAIN_SIGNING_KEY:-}" ]; then
            echo "Missing SUPPLY_CHAIN_SIGNING_KEY GitHub Actions secret"
            exit 1
          fi

      - name: Supply chain (SBOM + sign + verify)
        run: |
          python supply_chain/sbom.py
          python supply_chain/sign.py
          python supply_chain/verify.py
          python supply_chain/license_gate.py
          python supply_chain/cve_gate.py
