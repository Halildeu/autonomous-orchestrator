name: gate-schema
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate JSON schemas + instances
        run: |
          python ci/validate_schemas.py

      - name: Run smoke test (local runner + policy dry-run)
        run: |
          python ci/smoke_test.py
