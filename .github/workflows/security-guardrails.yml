name: security-guardrails

on:
  workflow_dispatch:
    inputs:
      dependency_scan_mode:
        description: "Dependency scan mode"
        required: false
        default: full
        type: choice
        options:
          - full
          - cache-only
  schedule:
    - cron: "17 3 * * 1-5"
  pull_request:
    paths:
      - "backend/**"
      - "web/**"
      - "scripts/**"
      - ".github/workflows/security-guardrails.yml"

jobs:
  guardrails:
    runs-on: ubuntu-latest
    env:
      ZAP_TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}
      ZAP_AUTH_MODE: ${{ vars.ZAP_AUTH_MODE }}
      ZAP_AUTH_HEADER_NAME: ${{ vars.ZAP_AUTH_HEADER_NAME }}
      ZAP_AUTH_HEADER_VALUE: ${{ secrets.ZAP_AUTH_HEADER_VALUE }}
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      # NVD removed — replaced by OSV-Scanner (15s vs 40min)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Install OSV-Scanner (pre-built binary)
        run: |
          OSV_VERSION="2.0.2"
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      # NVD mode determination removed — OSV-Scanner needs no cache/mode logic

      - name: Baseline security checks
        run: python3 scripts/check_security_all.py

      - name: Check live release provisioning contract
        run: python3 scripts/check_live_release_provisioning_contract.py

      - name: Backend SAST
        run: bash backend/scripts/ci/security/run-sast.sh

      - name: Dependency scan (OSV-Scanner)
        run: bash backend/scripts/ci/security/run-dependency-scan.sh

      - name: SBOM + signing
        run: bash backend/scripts/ci/security/generate-sbom-and-sign.sh

      - name: Feature flag health
        run: ruby backend/scripts/ci/security/export-flag-health.rb

      - name: Check security remediation contract
        run: python3 scripts/check_security_remediation_contract.py

      - name: ZAP baseline
        if: ${{ env.ZAP_TARGET_URL != '' }}
        run: bash backend/scripts/ci/security/run-dast.sh

      - name: Skip ZAP baseline if target missing
        if: ${{ env.ZAP_TARGET_URL == '' }}
        run: echo "::notice title=security-guardrails::ZAP_TARGET_URL missing; DAST skipped."

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: backend/test-results/security/**
          if-no-files-found: warn
