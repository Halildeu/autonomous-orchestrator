name: security-guardrails

on:
  workflow_dispatch:
    inputs:
      dependency_scan_mode:
        description: "Dependency scan mode"
        required: false
        default: full
        type: choice
        options:
          - full
          - cache-only
  schedule:
    - cron: "17 3 * * 1-5"
  pull_request:
    paths:
      - "backend/**"
      - "web/**"
      - "scripts/**"
      - ".github/workflows/security-guardrails.yml"

jobs:
  guardrails:
    runs-on: ubuntu-latest
    env:
      ZAP_TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}
      ZAP_AUTH_MODE: ${{ vars.ZAP_AUTH_MODE }}
      ZAP_AUTH_HEADER_NAME: ${{ vars.ZAP_AUTH_HEADER_NAME }}
      ZAP_AUTH_HEADER_VALUE: ${{ secrets.ZAP_AUTH_HEADER_VALUE }}
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      DEPENDENCY_CHECK_VERSION: "12.2.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Restore dependency-check cache
        uses: actions/cache@v4
        with:
          path: backend/test-results/security/dependency-check/cache-v12_2_0
          key: ${{ runner.os }}-dependency-check-v12_2_0
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Determine dependency scan mode
        id: dependency-scan-mode
        shell: bash
        run: |
          set -euo pipefail

          mode="full"
          reason="scheduled-or-manual-full"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            mode="cache-only"
            reason="pull-request-fast-path"
            base_sha="${{ github.event.pull_request.base.sha || '' }}"
            head_sha="${{ github.event.pull_request.head.sha || '' }}"

            if [[ -n "${base_sha}" && -n "${head_sha}" ]]; then
              changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
              if printf '%s\n' "${changed_files}" | grep -Eq '^(backend/pom\.xml|backend/.+/pom\.xml|backend/\.mvn/.*|backend/mvnw|backend/scripts/ci/security/.*|\.github/workflows/security-guardrails\.yml)$'; then
                mode="full"
                reason="dependency-or-security-surface-changed"
              fi
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            mode="${{ github.event.inputs.dependency_scan_mode || 'full' }}"
            reason="manual-${mode}"
          elif [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            mode="full"
            reason="scheduled-refresh"
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "[security][dependency-check] mode=${mode} reason=${reason}"

      - name: Baseline security checks
        run: python3 scripts/check_security_all.py

      - name: Check live release provisioning contract
        run: python3 scripts/check_live_release_provisioning_contract.py

      - name: Backend SAST
        run: bash backend/scripts/ci/security/run-sast.sh

      - name: Dependency scan
        env:
          DEPENDENCY_CHECK_MODE: ${{ steps.dependency-scan-mode.outputs.mode }}
        run: bash backend/scripts/ci/security/run-dependency-scan.sh

      - name: SBOM + signing
        run: bash backend/scripts/ci/security/generate-sbom-and-sign.sh

      - name: Feature flag health
        run: ruby backend/scripts/ci/security/export-flag-health.rb

      - name: Check security remediation contract
        run: python3 scripts/check_security_remediation_contract.py

      - name: ZAP baseline
        if: ${{ env.ZAP_TARGET_URL != '' }}
        run: bash backend/scripts/ci/security/run-dast.sh

      - name: Skip ZAP baseline if target missing
        if: ${{ env.ZAP_TARGET_URL == '' }}
        run: echo "::notice title=security-guardrails::ZAP_TARGET_URL missing; DAST skipped."

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: backend/test-results/security/**
          if-no-files-found: warn
